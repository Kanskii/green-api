<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREEN-API Console</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0a;
    --surface: #111811;
    --surface2: #162016;
    --border: #1e2e1e;
    --accent: #22c55e;
    --accent-dim: #16a34a;
    --accent-glow: rgba(34,197,94,0.15);
    --text: #e2f0e2;
    --text-muted: #6b8f6b;
    --text-dim: #3d5c3d;
    --input-bg: #0d160d;
    --red: #ef4444;
    --yellow: #eab308;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,15,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-dots {
    display: flex;
    gap: 6px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.2s;
  }
  .dot:nth-child(1) { background: var(--red); }
  .dot:nth-child(2) { background: var(--yellow); }
  .dot:nth-child(3) { background: var(--accent); }

  .topbar-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-left: 8px;
  }

  .topbar-badge {
    font-size: 10px;
    padding: 2px 8px;
    background: var(--accent-glow);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 20px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    padding: 32px 32px 32px 32px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    align-items: start;
  }

  .panel-left {
    padding-right: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Input group */
  .input-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group:focus-within {
    border-color: rgba(34,197,94,0.4);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .field {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .field:last-child { border-bottom: none; }

  .field-icon {
    width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 12px;
    flex-shrink: 0;
  }

  input, textarea {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 100%;
    padding: 12px 12px 12px 0;
  }
  input::placeholder, textarea::placeholder {
    color: var(--text-dim);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
    padding: 12px;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 11px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover {
    border-color: rgba(34,197,94,0.5);
    color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn:hover::before { opacity: 1; }

  .btn:active { transform: scale(0.98); }

  .btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  .btn-arrow::before {
    content: '▶';
    font-size: 9px;
  }

  /* Method blocks */
  .method-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .method-inputs {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .method-inputs input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 12px;
    width: 100%;
    transition: border-color 0.2s;
  }
  .method-inputs input:focus {
    border-color: rgba(34,197,94,0.4);
  }

  .method-btn {
    margin: 0;
    border: none;
    border-radius: 0;
    background: transparent;
    border-top: none;
    padding: 12px;
    font-size: 12px;
  }
  .method-btn:hover { border-color: transparent; }

  /* Right panel — response */
  .panel-right {
    border-left: 1px solid var(--border);
    padding-left: 28px;
    min-height: 600px;
    display: flex;
    flex-direction: column;
  }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .response-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .response-status {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .response-status.ok {
    color: var(--accent);
    border-color: rgba(34,197,94,0.4);
    background: var(--accent-glow);
  }
  .response-status.error {
    color: var(--red);
    border-color: rgba(239,68,68,0.4);
    background: rgba(239,68,68,0.08);
  }

  .response-area {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-muted);
    overflow-y: auto;
    min-height: 500px;
    white-space: pre-wrap;
    word-break: break-all;
    position: relative;
    transition: border-color 0.3s;
  }

  .response-area.has-content {
    color: var(--text);
    border-color: rgba(34,197,94,0.2);
  }

  /* JSON syntax highlighting */
  .json-key { color: #7dd3fc; }
  .json-string { color: #86efac; }
  .json-number { color: #fbbf24; }
  .json-bool { color: #f472b6; }
  .json-null { color: #94a3b8; }

  .placeholder-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-dim);
    pointer-events: none;
  }
  .placeholder-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .placeholder-text p { font-size: 11px; letter-spacing: 0.05em; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Pulse animation for active request */
  @keyframes pulse-border {
    0%, 100% { border-color: rgba(34,197,94,0.2); }
    50% { border-color: rgba(34,197,94,0.6); }
  }
  .response-area.loading {
    animation: pulse-border 1s ease-in-out infinite;
  }

  /* Separator */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Fade-in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }

  /* Log entries */
  .log-entry {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease;
  }
  .log-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .log-method {
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .log-method .ts {
    color: var(--text-dim);
    font-size: 10px;
  }
  .log-body { font-size: 12px; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .panel-left { padding-right: 0; }
    .panel-right { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 24px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="topbar-brand">GREEN-API</div>
  <div class="topbar-badge">Console</div>
</div>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel-left">

    <!-- Connection -->
    <div>
      <div class="section-label">Подключение</div>
      <div class="input-group">
        <div class="field">
          <div class="field-icon">#</div>
          <input type="text" id="idInstance" placeholder="idInstance" autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <div class="field-icon">🔑</div>
          <input type="password" id="apiToken" placeholder="ApiTokenInstance" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>

    <!-- getSettings -->
    <div>
      <div class="section-label">Настройки</div>
      <button class="btn btn-arrow" onclick="callGetSettings()">getSettings</button>
    </div>

    <!-- getStateInstance -->
    <button class="btn btn-arrow" onclick="callGetStateInstance()">getStateInstance</button>

    <!-- sendMessage -->
    <div>
      <div class="section-label">Отправка сообщения</div>
      <div class="method-block">
        <div class="method-inputs">
          <input type="text" id="msgPhone" placeholder="7777234567  (номер телефона)" autocomplete="off">
          <textarea id="msgText" placeholder="Hello World!" rows="2"></textarea>
        </div>
        <button class="btn method-btn btn-arrow" onclick="callSendMessage()">sendMessage</button>
      </div>
    </div>

    <!-- sendFileByUrl -->
    <div>
      <div class="section-label">Отправка файла</div>
      <div class="method-block">
        <div class="method-inputs">
          <input type="text" id="filePhone" placeholder="7777234567  (номер телефона)" autocomplete="off">
          <input type="text" id="fileUrl" placeholder="https://my.site.com/img/horse.png" autocomplete="off">
          <input type="text" id="fileCaption" placeholder="Подпись (необязательно)" autocomplete="off">
        </div>
        <button class="btn method-btn btn-arrow" onclick="callSendFileByUrl()">sendFileByUrl</button>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="response-header">
      <div class="response-title">Ответ</div>
      <div class="response-status" id="statusBadge">— idle</div>
    </div>
    <div class="response-area" id="responseArea">
      <div class="placeholder-text" id="placeholder">
        <div class="placeholder-icon">⬡</div>
        <p>Введите параметры подключения<br>и вызовите метод</p>
      </div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://media.green-api.com';

  function getId()    { return document.getElementById('idInstance').value.trim(); }
  function getToken() { return document.getElementById('apiToken').value.trim(); }

  function validate() {
    if (!getId() || !getToken()) {
      showError('⚠ Заполните idInstance и ApiTokenInstance');
      return false;
    }
    return true;
  }

  function setStatus(text, type = '') {
    const el = document.getElementById('statusBadge');
    el.textContent = text;
    el.className = 'response-status' + (type ? ' ' + type : '');
  }

  function showLoading(method) {
    const area = document.getElementById('responseArea');
    document.getElementById('placeholder').style.display = 'none';
    area.classList.add('loading');
    area.classList.remove('has-content');
    area.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--text-muted)"><span class="spinner"></span> Вызов ${method}…</div>`;
    setStatus('● pending');
  }

  function showResult(method, data, isError = false) {
    const area = document.getElementById('responseArea');
    area.classList.remove('loading');
    area.classList.add('has-content');

    const ts = new Date().toLocaleTimeString('ru-RU');
    const formatted = syntaxHighlight(JSON.stringify(data, null, 2));

    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <div class="log-method">${method} <span class="ts">${ts}</span></div>
      <div class="log-body">${formatted}</div>
    `;

    // Prepend
    if (area.querySelector('.log-entry')) {
      area.insertBefore(entry, area.firstChild);
    } else {
      area.innerHTML = '';
      area.appendChild(entry);
    }

    setStatus(isError ? '✕ error' : '✓ ok', isError ? 'error' : 'ok');
  }

  function showError(msg) {
    const area = document.getElementById('responseArea');
    area.classList.remove('loading');
    area.classList.add('has-content');
    document.getElementById('placeholder').style.display = 'none';

    const ts = new Date().toLocaleTimeString('ru-RU');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <div class="log-method" style="color:var(--red)">ERROR <span class="ts">${ts}</span></div>
      <div class="log-body" style="color:var(--red)">${msg}</div>
    `;
    if (area.querySelector('.log-entry')) {
      area.insertBefore(entry, area.firstChild);
    } else {
      area.innerHTML = '';
      area.appendChild(entry);
    }
    setStatus('✕ error', 'error');
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        let cls = 'json-number';
        if (/^"/.test(match)) {
          cls = /:$/.test(match) ? 'json-key' : 'json-string';
        } else if (/true|false/.test(match)) {
          cls = 'json-bool';
        } else if (/null/.test(match)) {
          cls = 'json-null';
        }
        return `<span class="${cls}">${match}</span>`;
      });
  }

  async function apiFetch(url, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    const data = await res.json();
    return { data, ok: res.ok };
  }

  async function callGetSettings() {
    if (!validate()) return;
    showLoading('getSettings');
    try {
      const url = `${BASE_URL}/waInstance${getId()}/getSettings/${getToken()}`;
      const { data, ok } = await apiFetch(url);
      showResult('getSettings', data, !ok);
    } catch (e) { showError(e.message); }
  }

  async function callGetStateInstance() {
    if (!validate()) return;
    showLoading('getStateInstance');
    try {
      const url = `${BASE_URL}/waInstance${getId()}/getStateInstance/${getToken()}`;
      const { data, ok } = await apiFetch(url);
      showResult('getStateInstance', data, !ok);
    } catch (e) { showError(e.message); }
  }

  async function callSendMessage() {
    if (!validate()) return;
    const phone = document.getElementById('msgPhone').value.trim();
    const text  = document.getElementById('msgText').value.trim();
    if (!phone || !text) { showError('⚠ Укажите номер телефона и текст сообщения'); return; }
    showLoading('sendMessage');
    try {
      const url = `${BASE_URL}/waInstance${getId()}/sendMessage/${getToken()}`;
      const { data, ok } = await apiFetch(url, 'POST', {
        chatId: `${phone}@c.us`,
        message: text
      });
      showResult('sendMessage', data, !ok);
    } catch (e) { showError(e.message); }
  }

  async function callSendFileByUrl() {
    if (!validate()) return;
    const phone   = document.getElementById('filePhone').value.trim();
    const fileUrl = document.getElementById('fileUrl').value.trim();
    const caption = document.getElementById('fileCaption').value.trim();
    if (!phone || !fileUrl) { showError('⚠ Укажите номер телефона и URL файла'); return; }
    showLoading('sendFileByUrl');
    try {
      const url = `${BASE_URL}/waInstance${getId()}/sendFileByUrl/${getToken()}`;
      const body = { chatId: `${phone}@c.us`, urlFile: fileUrl, fileName: fileUrl.split('/').pop() };
      if (caption) body.caption = caption;
      const { data, ok } = await apiFetch(url, 'POST', body);
      showResult('sendFileByUrl', data, !ok);
    } catch (e) { showError(e.message); }
  }
</script>
</body>
</html>
